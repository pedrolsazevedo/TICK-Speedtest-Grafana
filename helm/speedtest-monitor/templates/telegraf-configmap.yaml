apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-telegraf-config
  labels:
    {{- include "speedtest-monitor.labels" . | nindent 4 }}
data:
  telegraf.conf: |
    [agent]
      interval = "5m"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      flush_interval = "10s"

    [[outputs.influxdb_v2]]
      urls = ["http://{{ .Release.Name }}-influxdb2:80"]
      token = "{{ .Values.influxdb2.adminUser.token }}"
      organization = "{{ .Values.influxdb2.adminUser.organization }}"
      bucket = "{{ .Values.influxdb2.adminUser.bucket }}"

    [[inputs.exec]]
      commands = ["/usr/bin/speedtest --accept-license --accept-gdpr -f json-pretty"]
      name_override = "Speedtest"
      timeout = "5m"
      interval = "{{ .Values.telegraf.interval }}"
      data_format = "json"
      json_string_fields = [
        "host",
        "interface_externalIp",
        "server_name",
        "server_id",
        "server_location",
        "server_host",
        "server_ip",
        "result_url"
      ]
