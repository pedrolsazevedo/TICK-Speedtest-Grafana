[agent]
  interval = "5m"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["$INFLUXDB_URL"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

[[inputs.exec]]
  commands = ["/usr/bin/speedtest --accept-license --accept-gdpr -f json-pretty"]
  name_override = "Speedtest"
  timeout = "5m"
  interval = "$SPEEDTEST_INTERVAL"
  data_format = "json"
  json_string_fields = [
    "host",
    "interface_externalIp",
    "server_name",
    "server_id",
    "server_location",
    "server_host",
    "server_ip",
    "result_url"
  ]
